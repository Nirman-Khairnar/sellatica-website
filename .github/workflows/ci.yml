name: Node.js CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci 2>/dev/null || npm install

      - name: Lint
        run: npm run lint 2>/dev/null || npx eslint . --ext .ts,.tsx,.js,.jsx 2>/dev/null || echo "No linter configured"

      - name: Type check
        run: npx tsc --noEmit 2>/dev/null || echo "No TypeScript config"

      - name: Build
        run: npm run build 2>/dev/null || echo "No build script"

      - name: Test
        run: npm test 2>/dev/null || echo "No tests configured"
